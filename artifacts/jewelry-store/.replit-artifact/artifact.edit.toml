kind = "web"
  previewPath = "/"
  title = "Jewelry Store"
  version = "1.0.0"
  id = "artifacts/jewelry-store"
  router = "path"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 23096

  [services.development]
  run = "cd /home/runner/workspace/client && npm install && npm run dev"

  [services.production]
  build = [ "npm", "run", "build", "--prefix", "client" ]
  publicDir = "client/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "23096"
  BASE_PATH = "/"
  