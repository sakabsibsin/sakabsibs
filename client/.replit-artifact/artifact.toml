kind = "web"
previewPath = "/"
title = "Jewelry Store"
version = "1.0.0"
id = "artifacts/jewelry-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23096

[services.development]
run = "sleep infinity"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jewelry-store", "run", "build" ]
publicDir = "artifacts/jewelry-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23096"
BASE_PATH = "/"
