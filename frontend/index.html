    <!-- Favicons & home-screen icons. SVG is the primary favicon (crisp at any
         size, supported by all modern browsers). PNG is kept as a fallback and
         is required by iOS for the apple-touch-icon. -->
    <link rel="icon" type="image/svg+xml" href="/sakabsibs-logo.svg" />
    <link rel="icon" type="image/png" href="/sakabsibs-logo.png" />
    <link rel="shortcut icon" href="/sakabsibs-logo.svg" />
    <link rel="apple-touch-icon" href="/sakabsibs-logo.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Brand chrome: burgundy primary tints the browser address bar and Android status bar -->
    <meta name="theme-color" content="#4A1E1E" />

    <!-- iOS web app behaviour when saved to the home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sakab Sibs" />
